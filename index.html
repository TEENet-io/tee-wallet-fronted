<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Wallet</title>
    <script>
      // Capture the API base path before React Router changes the URL.
      // Same logic as old index_old.html: derive from the initial page path.
      // e.g. "/" -> "", "/instance/abc123/" -> "/instance/abc123"
      window.__API_BASE__ = window.location.pathname.replace(/\/+$/, '');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
